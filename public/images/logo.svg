<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <!-- Shield icon -->
  <g transform="translate(0, 4)">
    <path d="M28 2L8 9v14c0 11 8.5 19.5 20 22 11.5-2.5 20-11 20-22V9L28 2z" fill="#0F2044"/>
    <!-- Cross -->
    <rect x="23.5" y="21.5" width="9" height="9" fill="#B91C1C"/>
    <polygon points="25,13.5 31,13.5 30.5,21.5 25.5,21.5" fill="#B91C1C"/>
    <polygon points="25.5,30.5 30.5,30.5 31,38.5 25,38.5" fill="#B91C1C"/>
    <polygon points="13.5,24.5 13.5,27.5 21.5,27 21.5,25" fill="#B91C1C"/>
    <polygon points="34.5,25 34.5,27 42.5,27.5 42.5,24.5" fill="#B91C1C"/>
    <!-- V-notches -->
    <polygon points="25,13.5 28,16 31,13.5 29.5,14.8 28,13.5 26.5,14.8" fill="#0F2044"/>
    <polygon points="25,38.5 28,36 31,38.5 29.5,37.2 28,38.5 26.5,37.2" fill="#0F2044"/>
    <polygon points="13.5,24.5 16,26 13.5,27.5 14.8,26.8 13.5,26 14.8,25.2" fill="#0F2044"/>
    <polygon points="42.5,24.5 40,26 42.5,27.5 41.2,26.8 42.5,26 41.2,25.2" fill="#0F2044"/>
    <!-- Shield border -->
    <path d="M28 2L8 9v14c0 11 8.5 19.5 20 22 11.5-2.5 20-11 20-22V9L28 2z" fill="none" stroke="#B91C1C" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Wordmark -->
  <g transform="translate(64, 0)" font-family="'Libre Baskerville', Georgia, serif">
    <text x="0" y="30" font-size="22" font-weight="700" fill="#0F2044" letter-spacing="-0.3">First Due</text>
    <text x="0" y="52" font-size="14" font-weight="400" fill="#B91C1C" letter-spacing="2.5" font-family="'DM Sans', system-ui, sans-serif" text-transform="uppercase">ADVISORS</text>
  </g>
  
  <!-- Separator line -->
  <rect x="60" y="4" width="2" height="56" fill="#E5E7EB" rx="1"/>
</svg>
